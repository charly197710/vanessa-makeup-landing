<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 320" width="800" height="320">
  <defs>
    <!-- Gradiente rose gold principal -->
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f5e6d8"/>
      <stop offset="30%" stop-color="#d4956a"/>
      <stop offset="60%" stop-color="#c4836c"/>
      <stop offset="100%" stop-color="#d4956a"/>
    </linearGradient>
    
    <!-- Sombra -->
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="2" dy="3" stdDeviation="4" flood-color="#0d0d0d" flood-opacity="0.6"/>
    </filter>
    
    <!-- Brillo 3D -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  
  <!-- Monograma V+M con sombra -->
  <text x="403" y="175" font-family="Georgia, 'Times New Roman', serif" font-size="100" font-weight="400" fill="#0d0d0d" opacity="0.25" filter="url(#shadow)">V+M</text>
  
  <!-- Monograma V+M principal -->
  <text x="400" y="172" font-family="Georgia, 'Times New Roman', serif" font-size="100" font-weight="400" fill="url(#gold)" filter="url(#glow)">V+M</text>
  
  <!-- Linea decorativa -->
  <line x1="260" y1="195" x2="540" y2="195" stroke="url(#gold)" stroke-width="1.2" opacity="0.7"/>
  
  <!-- Diamante -->
  <polygon points="400,190 406,195 400,200 394,195" fill="url(#gold)" opacity="0.8"/>
  
  <!-- VANESSA -->
  <text x="400" y="245" font-family="Georgia, 'Times New Roman', serif" font-size="38" font-weight="400" fill="url(#gold)" letter-spacing="10" text-anchor="middle">VANESSA</text>
  
  <!-- MAKE UP -->
  <text x="400" y="280" font-family="'Segoe UI', Arial, sans-serif" font-size="16" font-weight="300" fill="#c4836c" letter-spacing="7" text-anchor="middle">MAKE UP</text>
  
  <!-- Linea inferior -->
  <line x1="300" y1="292" x2="500" y2="292" stroke="url(#gold)" stroke-width="0.6" opacity="0.5"/>
</svg>