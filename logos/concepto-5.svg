<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600">
  <defs>
    <linearGradient id="metalRose5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f0d4c8"/>
      <stop offset="50%" stop-color="#c4836c"/>
      <stop offset="100%" stop-color="#7a4a38"/>
    </linearGradient>
    <filter id="texture">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="2" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
  </defs>
  <rect width="600" height="600" fill="#0d0d0d"/>

  <!-- Brochazo orgánico como letra V -->
  <g transform="translate(300,260)" filter="url(#texture)">
    <path d="M-100,90 C-80,20 -40,-40 0,-90 C40,-40 80,20 100,90" 
          stroke="url(#metalRose5)" stroke-width="22" 
          fill="none" stroke-linecap="round" opacity="0.95"/>
    <!-- pigmento salpicado cerca de la punta -->
    <circle cx="-95" cy="75" r="3" fill="#c4836c" opacity="0.6"/>
    <circle cx="-70" cy="30" r="2" fill="#c4836c" opacity="0.5"/>
    <circle cx="80" cy="50" r="2.5" fill="#c4836c" opacity="0.55"/>
    <circle cx="100" cy="85" r="2" fill="#c4836c" opacity="0.5"/>
  </g>

  <text x="300" y="420" text-anchor="middle" 
        font-family="Georgia, serif" font-size="44" 
        fill="#e8e8e8" letter-spacing="16" font-weight="300">VANESSA</text>

  <line x1="190" y1="445" x2="410" y2="445" stroke="#c4836c" stroke-width="1" opacity="0.5"/>

  <text x="300" y="475" text-anchor="middle" 
        font-family="Helvetica Neue, Arial, sans-serif" font-size="24" 
        fill="#c4836c" letter-spacing="20" font-weight="300">MAKE UP</text>

  <text x="300" y="510" text-anchor="middle" 
        font-family="Helvetica Neue, Arial, sans-serif" font-size="11" 
        fill="#777" letter-spacing="5" font-weight="400">MAQUILLAJE PROFESIONAL</text>
</svg>
EOF