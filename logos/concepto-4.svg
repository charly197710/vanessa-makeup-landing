<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600">
  <defs>
    <linearGradient id="metalRose4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e8c4b8"/>
      <stop offset="45%" stop-color="#c4836c"/>
      <stop offset="100%" stop-color="#8a5a45"/>
    </linearGradient>
    <filter id="glow4">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="600" height="600" fill="#0d0d0d"/>

  <!-- Cualismo circular como contenedor -->
  <circle cx="300" cy="260" r="110" fill="none" stroke="url(#metalRose4)" stroke-width="2" opacity="0.7"/>
  <circle cx="300" cy="260" r="100" fill="none" stroke="url(#metalRose4)" stroke-width="1" opacity="0.4"/>

  <!-- V+M en círculo como marca fundacional -->
  <g transform="translate(300,240)" filter="url(#glow4)">
    <text x="0" y="10" text-anchor="middle" 
          font-family="Georgia, serif" font-size="80" 
          fill="url(#metalRose4)" letter-spacing="8" font-weight="400">V+M</text>
    <!-- brochazo corto saliendo a la derecha -->
    <path d="M35,5 Q55,0 70,8" 
          stroke="url(#metalRose4)" stroke-width="5" 
          fill="none" stroke-linecap="round" opacity="0.85"/>
  </g>

  <!-- Vanessa -->
  <text x="300" y="410" text-anchor="middle" 
        font-family="Georgia, serif" font-size="46" 
        fill="url(#silver)" letter-spacing="14" font-weight="300">VANESSA</text>

  <line x1="195" y1="432" x2="405" y2="432" stroke="#c4836c" stroke-width="1.2" opacity="0.5"/>

  <text x="300" y="462" text-anchor="middle" 
        font-family="Helvetica Neue, Arial, sans-serif" font-size="24" 
        fill="#c4836c" letter-spacing="20" font-weight="300">MAKE UP</text>

  <text x="300" y="495" text-anchor="middle" 
        font-family="Helvetica Neue, Arial, sans-serif" font-size="11" 
        fill="#777" letter-spacing="5" font-weight="400">MAQUILLAJE PROFESIONAL</text>
</svg>