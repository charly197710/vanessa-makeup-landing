<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600">
  <defs>
    <linearGradient id="metalRose" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e8b4b8"/>
      <stop offset="50%" stop-color="#c4836c"/>
      <stop offset="100%" stop-color="#a86b56"/>
    </linearGradient>
    <linearGradient id="silver" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#b8b8b8"/>
      <stop offset="50%" stop-color="#e8e8e8"/>
      <stop offset="100%" stop-color="#b8b8b8"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Negro mate -->
  <rect width="600" height="600" fill="#0d0d0d"/>

  <!-- Monograma V + M -->
  <g transform="translate(300,200)" filter="url(#glow)">
    <!-- V -->
    <path d="M-100,-70 L-20,60 L60,-70" 
          stroke="url(#metalRose)" stroke-width="22" 
          fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- M -->
    <path d="M80,60 L80,-70 L130,-10 L180,-70 L180,60" 
          stroke="url(#metalRose)" stroke-width="22" 
          fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Brochazo desde la M -->
    <path d="M240,-40 C290,-60 330,-25 360,0 C330,25 290,60 240,40 C300,20 310,10 360,0" 
          stroke="url(#metalRose)" stroke-width="18" 
          fill="none" stroke-linecap="round" opacity="0.9"/>
    <!-- Brillo interior -->
    <path d="M80,-70 L130,-10 L180,-70" 
          stroke="rgba(255,255,255,0.15)" stroke-width="6" 
          fill="none" stroke-linecap="round"/>
  </g>

  <!-- Nombre -->
  <text x="300" y="340" text-anchor="middle" 
        font-family="Georgia, serif" font-size="52" 
        fill="url(#silver)" letter-spacing="14" font-weight="400">VANESSA</text>

  <!-- Líneas decorativas -->
  <line x1="200" y1="370" x2="400" y2="370" stroke="#c4836c" stroke-width="1.5" opacity="0.6"/>
  <line x1="200" y1="376" x2="400" y2="376" stroke="#c4836c" stroke-width="1" opacity="0.4"/>

  <!-- Make Up -->
  <text x="300" y="400" text-anchor="middle" 
        font-family="Helvetica Neue, Arial, sans-serif" font-size="26" 
        fill="#c4836c" letter-spacing="18" font-weight="300">MAKE UP</text>

  <!-- Tagline -->
  <text x="300" y="440" text-anchor="middle" 
        font-family="Helvetica Neue, Arial, sans-serif" font-size="13" 
        fill="#888" letter-spacing="4" font-weight="400">MAQUILLAJE PROFESIONAL</text>
</svg>